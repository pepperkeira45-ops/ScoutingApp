name: Manual-Only Pit Scouting CSV Update

on:
  workflow_dispatch: # Keeps the "Run Workflow" button in GitHub Actions
  # The 'schedule' block has been removed to stop automatic updates

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write 

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Compile and Run Java Downloader
        run: |
          javac src/DownloadCSV.java
          java -cp src DownloadCSV

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add data.csv
          
          git commit -m "Manual data.csv update triggered by user" || echo "No changes to commit"
          
          git push
